<header class="header">
  <a class="header__logo" routerLink="/">
    <img src="logo.png" alt="RuleTrack" class="header__logo-img">
  </a>

  <div class="header__actions">
    @if (auth.currentUser()) {
      <button class="header__user" aria-label="Cerrar sesión" (click)="logout()" title="Cerrar sesión">
        <svg class="header__user-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
      </button>
    } @else {
      <a class="header__login-btn" routerLink="/login">Iniciar sesión</a>
    }
  </div>
</header>
