<section class="converting">
  @if (!conversionError()) {
    <div class="converting__banner">
      <h1 class="converting__title">Convirtiendo {{ fileName }} a Markdown...</h1>
    </div>

    <div class="converting__visual">
      <!-- PDF icon -->
      <div class="converting__icon converting__icon--pdf">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
          <rect x="2" y="2" width="76" height="96" rx="4" fill="#fff" stroke="#e53935" stroke-width="3"/>
          <path d="M50 2 V28 H76" fill="none" stroke="#e53935" stroke-width="3"/>
          <path d="M50 2 L76 28" fill="none" stroke="#e53935" stroke-width="3"/>
          <rect x="12" y="50" width="56" height="30" rx="3" fill="#e53935"/>
          <text x="40" y="71" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">PDF</text>
        </svg>
      </div>

      <!-- Arrow -->
      <div class="converting__arrow">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 24" fill="none">
          <line x1="0" y1="12" x2="100" y2="12" stroke="#333" stroke-width="2.5"/>
          <polyline points="90,4 104,12 90,20" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- Markdown icon -->
      <div class="converting__icon converting__icon--md">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 62" fill="none">
          <rect x="2" y="2" width="96" height="58" rx="6" fill="#333" stroke="#333" stroke-width="3"/>
          <path d="M16 44 V18 L30 34 L44 18 V44" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M62 44 V18" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <polyline points="54,30 62,44 70,30" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="78" y1="44" x2="78" y2="26" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <polyline points="72,32 78,26 84,32" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  } @else {
    <div class="converting__error">
      <p>{{ conversionError() }}</p>
      <a class="btn btn--primary" routerLink="/upload">Volver</a>
    </div>
  }
</section>
