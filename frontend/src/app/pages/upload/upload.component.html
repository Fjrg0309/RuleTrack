<section class="upload">
  <div
    class="upload__dropzone"
    [class.upload__dropzone--active]="isDragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <p class="upload__dropzone-text">Sube tu archivo en formato pdf, markdown o doc aquí</p>
    <div class="upload__dropzone-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
        <!-- Folder body -->
        <rect x="10" y="30" width="80" height="55" rx="4" fill="#8AD2FE" stroke="#5ba3d9" stroke-width="2"/>
        <!-- Folder tab -->
        <path d="M10 30 V22 Q10 18 14 18 H35 Q38 18 40 22 L43 30 Z" fill="#8AD2FE" stroke="#5ba3d9" stroke-width="2"/>
        <!-- Arrow up -->
        <line x1="50" y1="68" x2="50" y2="38" stroke="#3a7cbd" stroke-width="4" stroke-linecap="round"/>
        <polyline points="38,48 50,34 62,48" fill="none" stroke="#3a7cbd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="upload__actions">
    <button class="btn btn--primary" (click)="openFilePicker()">Subir desde dispositivo</button>
  </div>

  <input
    #fileInput
    type="file"
    accept=".pdf,.md,.doc,.docx,.txt"
    class="upload__file-input"
    (change)="onFileSelected($event)"
  />
</section>
