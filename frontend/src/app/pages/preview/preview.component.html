<section class="preview">
  <h1 class="preview__title">El archivo {{ fileName }} está listo para corregirse</h1>

  <div class="preview__content">
    <pre class="preview__text">{{ fileContent }}</pre>
  </div>

  <div class="preview__actions">
    <button class="btn btn--primary" (click)="sendToAgent()">Enviar al agente</button>
    <button class="btn btn--cancel" (click)="cancel()">Cancelar</button>
  </div>
</section>
