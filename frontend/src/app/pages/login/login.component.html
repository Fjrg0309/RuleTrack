<section class="login">
  <div class="login__card">
    <div class="login__brand">
      <img src="logo.png" alt="RuleTrack" class="login__logo" />
      <h1 class="login__brand-name">RuleTrack</h1>
    </div>

    <p class="login__tagline">Accede a tu panel de reglamentos</p>

    <form class="login__form" (ngSubmit)="submit()" novalidate>
      <div class="login__field">
        <label class="login__label" for="login-user">Usuario</label>
        <input
          id="login-user"
          class="login__input"
          type="text"
          [(ngModel)]="username"
          name="username"
          autocomplete="username"
          placeholder="organizador"
        />
      </div>

      <div class="login__field">
        <label class="login__label" for="login-pass">Contraseña</label>
        <input
          id="login-pass"
          class="login__input"
          type="password"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          placeholder="••••"
        />
      </div>

      @if (error()) {
        <p class="login__error" role="alert">{{ error() }}</p>
      }

      <button class="login__submit" type="submit">Entrar</button>
    </form>

    <p class="login__hint">
      Credenciales de prueba: <strong>organizador&nbsp;/&nbsp;1234</strong>
    </p>
  </div>
</section>
